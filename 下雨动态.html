<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下雨动态</title>
  <style>
    :root {
      color-scheme: dark;
      --sky-top: #6e8297;
      --sky-mid: #8ea0b2;
      --sky-bottom: #b6c3cf;
      --mountain-far: #738192;
      --mountain-mid: #5e6d7d;
      --mountain-near: #445261;
      --water-top: #6a8197;
      --water-bottom: #364454;
      --rain-bright: rgba(241, 247, 255, 0.9);
      --rain-soft: rgba(210, 226, 241, 0.16);
      --ripple-main: rgba(235, 245, 255, 0.9);
      --ripple-soft: rgba(192, 218, 244, 0.28);
      --mist: rgba(228, 237, 246, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #75889c;
    }

    body {
      font-family: sans-serif;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.18), transparent 22%),
        linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 46%, var(--sky-bottom) 100%);
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scene::before {
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.08), transparent 16%),
        radial-gradient(circle at 82% 14%, rgba(255, 255, 255, 0.07), transparent 15%);
      opacity: 0.9;
    }

    .scene::after {
      background: linear-gradient(180deg, rgba(14, 22, 32, 0.08), rgba(14, 22, 32, 0.2));
    }

    .clouds {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.12), transparent 14%),
        radial-gradient(circle at 42% 18%, rgba(255, 255, 255, 0.1), transparent 15%),
        radial-gradient(circle at 70% 20%, rgba(255, 255, 255, 0.12), transparent 16%),
        radial-gradient(circle at 84% 26%, rgba(255, 255, 255, 0.08), transparent 12%);
      filter: blur(26px);
      opacity: 0.55;
      animation: cloudDrift 18s ease-in-out infinite;
    }

    .mountains {
      position: absolute;
      inset: 20% 0 auto;
      height: 34%;
    }

    .ridge {
      position: absolute;
      left: -6%;
      right: -6%;
      bottom: 0;
      filter: blur(0.8px);
    }

    .ridge.far {
      height: 42%;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(32, 44, 58, 0.12));
      background-color: var(--mountain-far);
      clip-path: polygon(0 100%, 0 78%, 10% 70%, 18% 74%, 30% 62%, 42% 70%, 54% 56%, 66% 68%, 78% 60%, 88% 70%, 100% 62%, 100% 100%);
      opacity: 0.72;
    }

    .ridge.mid {
      height: 54%;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 18%),
        linear-gradient(180deg, rgba(18, 30, 42, 0), rgba(18, 30, 42, 0.18));
      background-color: var(--mountain-mid);
      clip-path: polygon(0 100%, 0 86%, 9% 78%, 19% 84%, 32% 62%, 43% 78%, 55% 52%, 66% 70%, 78% 58%, 89% 72%, 100% 64%, 100% 100%);
      opacity: 0.8;
    }

    .ridge.near {
      height: 66%;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 16%),
        linear-gradient(180deg, rgba(16, 24, 34, 0), rgba(16, 24, 34, 0.22));
      background-color: var(--mountain-near);
      clip-path: polygon(0 100%, 0 94%, 8% 88%, 18% 92%, 30% 66%, 41% 84%, 53% 54%, 64% 76%, 76% 60%, 88% 78%, 100% 68%, 100% 100%);
      box-shadow: 0 14px 26px rgba(30, 44, 58, 0.14);
      opacity: 0.9;
    }

    .mist {
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: 31%;
      height: 14%;
      background:
        radial-gradient(circle at 22% 54%, var(--mist), transparent 16%),
        radial-gradient(circle at 50% 38%, rgba(232, 239, 247, 0.2), transparent 18%),
        radial-gradient(circle at 80% 52%, rgba(232, 239, 247, 0.14), transparent 16%);
      filter: blur(24px);
      opacity: 0.82;
      animation: mistFloat 12s ease-in-out infinite;
    }

    .water {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 42%;
      background:
        linear-gradient(180deg, rgba(223, 234, 245, 0.08) 0%, rgba(223, 234, 245, 0.03) 16%, transparent 20%),
        linear-gradient(180deg, var(--water-top) 0%, #52667a 34%, var(--water-bottom) 100%);
    }

    .water::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 28% 18%, rgba(235, 243, 250, 0.08), transparent 12%),
        radial-gradient(circle at 54% 14%, rgba(235, 243, 250, 0.08), transparent 14%),
        radial-gradient(circle at 80% 22%, rgba(235, 243, 250, 0.06), transparent 12%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 24%);
      opacity: 0.75;
    }

    .water::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03) 0 1px,
          transparent 1px 18px
        );
      opacity: 0.32;
    }

    .shore {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 40%;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(215, 226, 238, 0.16), transparent);
      opacity: 0.65;
    }

    .rain {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .rain.back {
      opacity: 0.45;
    }

    .rain.front {
      opacity: 0.82;
      filter: saturate(1.05);
    }

    .drop {
      position: absolute;
      top: -20%;
      width: 2px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0), var(--rain-bright) 28%, var(--rain-soft) 100%);
      transform: rotate(11deg);
      transform-origin: center top;
      animation: rainfall linear infinite;
    }

    .rain.back .drop {
      width: 1px;
      opacity: 0.55;
      filter: blur(0.2px);
    }

    .rain.front .drop {
      width: 2.2px;
      box-shadow: 0 0 8px rgba(235, 243, 250, 0.1);
    }

    .ripples {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 42%;
      overflow: hidden;
      pointer-events: none;
    }

    .ripple {
      position: absolute;
      width: 12px;
      height: 4px;
      margin-left: -6px;
      margin-top: -2px;
      border: 1.8px solid var(--ripple-main);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(235, 245, 255, 0.12), transparent 70%);
      box-shadow:
        0 0 12px var(--ripple-soft),
        inset 0 0 6px rgba(255, 255, 255, 0.08);
      transform: scaleX(1.8) rotateX(78deg);
      animation: rippleSpread ease-out infinite;
    }

    .ripple::after {
      content: "";
      position: absolute;
      inset: -4px;
      border: 1px solid rgba(230, 242, 255, 0.38);
      border-radius: inherit;
    }

    .ripple::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3px;
      height: 3px;
      margin-left: -1.5px;
      margin-top: -1.5px;
      border-radius: 50%;
      background: rgba(245, 250, 255, 0.85);
      box-shadow: 0 0 10px rgba(245, 250, 255, 0.45);
      animation: splashPulse ease-out infinite;
    }

    @keyframes rainfall {
      0% {
        transform: translate3d(0, 0, 0) rotate(11deg);
      }

      100% {
        transform: translate3d(42px, 124vh, 0) rotate(11deg);
      }
    }

    @keyframes rippleSpread {
      0% {
        width: 10px;
        height: 4px;
        margin-left: -5px;
        margin-top: -2px;
        opacity: 0;
      }

      15% {
        opacity: 0.95;
      }

      100% {
        width: 54px;
        height: 18px;
        margin-left: -27px;
        margin-top: -9px;
        opacity: 0;
      }
    }

    @keyframes splashPulse {
      0% {
        transform: scale(0.8);
        opacity: 0.95;
      }

      100% {
        transform: scale(1.7);
        opacity: 0;
      }
    }

    @keyframes cloudDrift {
      0%, 100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(12px);
      }
    }

    @keyframes mistFloat {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="clouds"></div>
    <div class="mountains">
      <div class="ridge far"></div>
      <div class="ridge mid"></div>
      <div class="ridge near"></div>
    </div>
    <div class="mist"></div>
    <div class="shore"></div>
    <div class="water"></div>
    <div class="rain back" id="rainBack"></div>
    <div class="rain front" id="rainFront"></div>
    <div class="ripples" id="ripples"></div>
  </div>

  <script>
    const rainBack = document.getElementById("rainBack");
    const rainFront = document.getElementById("rainFront");
    const ripples = document.getElementById("ripples");

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function buildRain(layer, count, minHeight, maxHeight, minDuration, maxDuration) {
      let html = "";

      for (let i = 0; i < count; i += 1) {
        const left = random(-8, 102);
        const height = random(minHeight, maxHeight);
        const delay = random(-2.4, 0);
        const duration = random(minDuration, maxDuration);

        html += `<span class="drop" style="left:${left}%; height:${height}px; animation-delay:${delay}s; animation-duration:${duration}s;"></span>`;
      }

      layer.innerHTML = html;
    }

    function buildRipples() {
      let html = "";

      for (let i = 0; i < 28; i += 1) {
        const left = random(4, 96);
        const top = random(12, 92);
        const delay = random(-2.6, 0);
        const duration = random(1.8, 2.8);

        html += `<span class="ripple" style="left:${left}%; top:${top}%; animation-delay:${delay}s; animation-duration:${duration}s;"></span>`;
      }

      ripples.innerHTML = html;
    }

    function render() {
      buildRain(rainBack, 90, 36, 78, 1.2, 1.8);
      buildRain(rainFront, 130, 54, 118, 0.8, 1.25);
      buildRipples();
    }

    render();
    window.addEventListener("resize", render);
  </script>
</body>
</html>
