<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下雨天下雨特效</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #08101f;
      --bg-bottom: #02050d;
      --rain-light: rgba(215, 234, 255, 0.9);
      --rain-shadow: rgba(94, 143, 206, 0.16);
      --flash-color: rgba(255, 255, 255, 0.95);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% 0%, rgba(142, 190, 255, 0.12), transparent 22%),
                  radial-gradient(circle at 20% 15%, rgba(89, 143, 214, 0.12), transparent 16%),
                  linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      position: relative;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans", Arial, sans-serif;
      color: #fff;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 85% 20%, rgba(255,255,255,0.08), transparent 18%);
      pointer-events: none;
    }

    .rain-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .raindrop {
      position: absolute;
      bottom: 110%;
      width: 2px;
      height: 100px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(145, 188, 255, 0.08));
      border-radius: 999px;
      filter: blur(0.25px);
      animation: dropFall linear infinite;
      opacity: 0.55;
    }

    .raindrop::after {
      content: "";
      position: absolute;
      top: 98%;
      left: 50%;
      width: 26px;
      height: 4px;
      transform: translateX(-50%) scaleX(0.7);
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      filter: blur(0.9px);
      opacity: 0.4;
    }

    .raindrop:nth-child(1)  { left: 3%;  animation-duration: 1.8s; animation-delay: 0.05s; }
    .raindrop:nth-child(2)  { left: 7%;  animation-duration: 1.75s; animation-delay: 0.35s; }
    .raindrop:nth-child(3)  { left: 12%; animation-duration: 1.9s; animation-delay: 0.25s; }
    .raindrop:nth-child(4)  { left: 17%; animation-duration: 1.7s; animation-delay: 0.12s; }
    .raindrop:nth-child(5)  { left: 23%; animation-duration: 1.85s; animation-delay: 0.33s; }
    .raindrop:nth-child(6)  { left: 28%; animation-duration: 1.95s; animation-delay: 0.18s; }
    .raindrop:nth-child(7)  { left: 34%; animation-duration: 1.78s; animation-delay: 0.22s; }
    .raindrop:nth-child(8)  { left: 40%; animation-duration: 1.82s; animation-delay: 0.08s; }
    .raindrop:nth-child(9)  { left: 46%; animation-duration: 2s; animation-delay: 0.27s; }
    .raindrop:nth-child(10) { left: 52%; animation-duration: 1.76s; animation-delay: 0.16s; }
    .raindrop:nth-child(11) { left: 57%; animation-duration: 1.89s; animation-delay: 0.05s; }
    .raindrop:nth-child(12) { left: 61%; animation-duration: 1.8s; animation-delay: 0.42s; }
    .raindrop:nth-child(13) { left: 67%; animation-duration: 1.74s; animation-delay: 0.21s; }
    .raindrop:nth-child(14) { left: 72%; animation-duration: 1.9s; animation-delay: 0.15s; }
    .raindrop:nth-child(15) { left: 77%; animation-duration: 1.95s; animation-delay: 0.29s; }
    .raindrop:nth-child(16) { left: 82%; animation-duration: 1.7s; animation-delay: 0.1s; }
    .raindrop:nth-child(17) { left: 87%; animation-duration: 1.88s; animation-delay: 0.24s; }
    .raindrop:nth-child(18) { left: 92%; animation-duration: 1.83s; animation-delay: 0.14s; }

    .dragon-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      overflow: hidden;
    }

    .dragon {
      width: clamp(320px, 50vw, 520px);
      max-width: 560px;
      opacity: 0.08;
      transform: scale(0.96);
      filter: blur(0.95px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      animation: dragonReveal 11s ease-in-out infinite;
    }

    .dragon svg {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0.9;
      filter: drop-shadow(0 0 18px rgba(132, 191, 255, 0.18));
    }

    .lightning-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      animation: lightningGlow 11s ease-in-out infinite;
    }

    .bolt {
      position: absolute;
      width: 4px;
      height: 170px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0));
      filter: blur(0.4px);
      opacity: 0;
      transform-origin: top;
    }

    .bolt:nth-child(1) {
      --r: 7deg;
      left: 20%;
      top: 6%;
      transform: rotate(7deg);
      animation: lightningStrike 11s ease-in-out infinite;
    }

    .bolt:nth-child(2) {
      --r: -8deg;
      left: 62%;
      top: 12%;
      transform: rotate(-8deg);
      animation: lightningStrike 13s ease-in-out infinite 2s;
    }

    .bolt:nth-child(3) {
      --r: 3deg;
      left: 80%;
      top: 4%;
      transform: rotate(3deg);
      animation: lightningStrike 10s ease-in-out infinite 5s;
    }

    .bolt::before,
    .bolt::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 6px;
      height: 50px;
      background: inherit;
      transform-origin: top;
    }

    .bolt::before { top: 40px; transform: translateX(-50%) rotate(24deg); }
    .bolt::after { top: 80px; transform: translateX(-50%) rotate(-22deg); }

    @keyframes dropFall {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { transform: translateY(120vh) translateX(12px); opacity: 0; }
    }

    @keyframes dragonReveal {
      0%, 12%, 100% { opacity: 0.08; transform: scale(0.96); }
      13%, 14% { opacity: 0.22; transform: scale(1); }
      15%, 16% { opacity: 0.09; transform: scale(0.98); }
      42%, 43% { opacity: 0.24; transform: scale(1.02); }
      44%, 45% { opacity: 0.1; transform: scale(0.98); }
      74%, 75% { opacity: 0.21; transform: scale(1.01); }
      76%, 77% { opacity: 0.09; transform: scale(0.97); }
    }

    @keyframes lightningGlow {
      0%, 12%, 100% { background: rgba(255,255,255,0); }
      13%, 14% { background: rgba(255,255,255,0.22); }
      15%, 16% { background: rgba(255,255,255,0); }
      42%, 43% { background: rgba(255,255,255,0.28); }
      44%, 45% { background: rgba(255,255,255,0); }
      74%, 75% { background: rgba(255,255,255,0.2); }
      76%, 77% { background: rgba(255,255,255,0); }
    }

    @keyframes lightningStrike {
      0%, 93%, 100% { opacity: 0; }
      94% { opacity: 1; transform: scaleY(1) translateY(0) rotate(var(--r)); }
      95% { opacity: 1; transform: scaleY(1.1) translateY(-6px) rotate(var(--r)); }
      96% { opacity: 0; transform: scaleY(1.2) translateY(-12px) rotate(var(--r)); }
    }

    @media (max-width: 700px) {
      .dragon { width: 220px; }
    }
  </style>
</head>
<body>
  <div class="rain-wrap">
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
    <div class="raindrop"></div>
  </div>
  <div class="dragon-wrap">
    <div class="dragon">
      <svg viewBox="0 0 640 360" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dragonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
            <stop offset="100%" stop-color="rgba(145, 188, 255, 0.18)" />
          </linearGradient>
        </defs>
        <path d="M122 225 C132 164 187 140 244 133 C286 98 338 88 390 102 C430 70 478 54 520 86 C514 92 500 93 487 108 C471 126 470 151 483 173 C504 186 533 176 553 198 C544 209 520 195 505 186 C493 204 474 218 446 224 C426 234 398 235 366 228 C324 218 290 206 255 216 C220 228 190 246 160 238 C144 232 132 220 122 225 Z" fill="url(#dragonGrad)" opacity="0.88"/>
        <path d="M232 240 C215 248 198 260 182 266 C172 279 160 295 148 310 C168 305 188 298 210 298 C236 299 270 312 308 314 C340 308 370 286 382 254 C370 263 354 272 334 280 C310 292 282 300 254 298 C244 287 238 268 232 240 Z" fill="rgba(255,255,255,0.16)" />
        <path d="M408 142 C418 126 432 106 450 95 C462 88 478 92 486 102 C478 100 468 107 460 116 C448 130 442 146 438 164 C432 173 426 186 420 206 C426 190 430 170 408 142 Z" fill="rgba(255,255,255,0.2)" />
      </svg>
    </div>
  </div>
  <div class="lightning-wrap">
    <div class="flash"></div>
    <div class="bolt"></div>
    <div class="bolt"></div>
    <div class="bolt"></div>
  </div>
</body>
</html>
