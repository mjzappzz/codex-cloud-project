<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下雨天解压动效</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111726;
      --panel: rgba(18, 33, 56, 0.88);
      --rain: rgba(173, 216, 230, 0.4);
      --text: #e7eef7;
      --muted: #99a7c1;
      --accent: #82c7ff;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans", Arial, sans-serif;
      background: radial-gradient(circle at top, rgba(148, 192, 255, 0.12), transparent 25%),
                  linear-gradient(180deg, #0d1726 0%, #081026 45%, #05101c 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: min(1000px, 100%);
      border-radius: 28px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      position: relative;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 30%),
                  radial-gradient(circle at 20% 20%, rgba(158, 210, 255, 0.14), transparent 18%),
                  radial-gradient(circle at 80% 15%, rgba(149, 195, 255, 0.08), transparent 16%);
      pointer-events: none;
    }

    .content {
      position: relative;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 32px;
      padding: 42px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.8rem, 4vw, 4.2rem);
      line-height: 1.02;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 0;
      font-size: 1rem;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.8;
    }

    .hero .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 16px;
    }

    .button {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      color: #081026;
      background: linear-gradient(135deg, rgba(128, 202, 255, 0.96), rgba(79, 150, 255, 0.92));
      box-shadow: 0 18px 30px rgba(45, 95, 165, 0.24);
    }

    .button:hover { transform: translateY(-2px); }

    .panel {
      position: relative;
      min-height: 520px;
      border-radius: 28px;
      background: rgba(9, 18, 36, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .window {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 420px;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(15, 29, 57, 0.96), rgba(8, 14, 29, 0.96));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .window::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 28%);
      pointer-events: none;
    }

    .window-top {
      position: absolute;
      inset: 0 0 auto 0;
      height: 62px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 22, 44, 0.88);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 2;
    }

    .window-title {
      margin: 0;
      color: var(--text);
      font-size: 1rem;
      letter-spacing: 0.08em;
      opacity: 0.92;
    }

    .window-buttons {
      display: flex;
      gap: 8px;
    }

    .window-buttons span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      background: #5cc6ff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.12);
    }

    .rain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.78;
    }

    .raindrop {
      position: absolute;
      bottom: 120%;
      width: 2px;
      height: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(128, 202, 255, 0.12));
      border-radius: 999px;
      filter: blur(0.35px);
      animation: fall linear infinite;
      opacity: 0.75;
    }

    .raindrop::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      width: 26px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      filter: blur(1px);
      opacity: 0.55;
    }

    .rain .drop:nth-child(1) { left: 12%; animation-duration: 1.9s; animation-delay: 0s; height: 22px; }
    .rain .drop:nth-child(2) { left: 18%; animation-duration: 1.6s; animation-delay: 0.35s; height: 18px; }
    .rain .drop:nth-child(3) { left: 29%; animation-duration: 2.2s; animation-delay: 0.18s; height: 24px; }
    .rain .drop:nth-child(4) { left: 34%; animation-duration: 1.8s; animation-delay: 0.08s; height: 20px; }
    .rain .drop:nth-child(5) { left: 42%; animation-duration: 2.0s; animation-delay: 0.23s; height: 22px; }
    .rain .drop:nth-child(6) { left: 55%; animation-duration: 1.75s; animation-delay: 0.5s; height: 20px; }
    .rain .drop:nth-child(7) { left: 62%; animation-duration: 1.9s; animation-delay: 0.12s; height: 23px; }
    .rain .drop:nth-child(8) { left: 70%; animation-duration: 2.1s; animation-delay: 0.38s; height: 19px; }
    .rain .drop:nth-child(9) { left: 77%; animation-duration: 1.7s; animation-delay: 0.27s; height: 22px; }
    .rain .drop:nth-child(10){ left: 83%; animation-duration: 2.3s; animation-delay: 0.05s; height: 24px; }

    .scene {
      position: absolute;
      inset: 74px 24px 24px 24px;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .cloud {
      position: absolute;
      left: 50%;
      top: 22%;
      width: 280px;
      height: 110px;
      transform: translateX(-50%);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), transparent 45%),
                  radial-gradient(circle at 70% 40%, rgba(255,255,255,0.18), transparent 42%),
                  linear-gradient(180deg, rgba(255,255,255,0.12), rgba(4, 10, 24, 0.18));
      border-radius: 999px;
      filter: blur(0.8px);
      animation: floatClouds 12s ease-in-out infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      width: 140px;
      height: 120px;
      border-radius: 999px;
      top: -34px;
    }

    .cloud::before { left: 12px; }
    .cloud::after { right: 10px; }

    .window-content {
      position: absolute;
      inset: 0 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 32px;
      gap: 18px;
    }

    .card-deck {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      width: 100%;
    }

    .card {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      min-height: 110px;
    }

    .card strong {
      color: #ffffff;
      font-size: 1rem;
    }

    .card p {
      margin: 0;
      color: rgba(231,238,247,0.78);
      font-size: 0.94rem;
      line-height: 1.7;
    }

    .loading-bar {
      position: relative;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .loading-bar::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(132,199,255,0.9), rgba(69,144,255,0.8));
      transform-origin: left;
      animation: pulseLoad 4s ease-in-out infinite;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      border-top: 1px solid rgba(255,255,255,0.07);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .footer span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .drop-text {
      position: absolute;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.82);
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.8;
      opacity: 0.92;
      z-index: 1;
      width: 80%;
    }

    @keyframes fall {
      0% { transform: translateY(0) scaleY(0.86); opacity: 0.1; }
      50% { opacity: 0.9; }
      100% { transform: translateY(120vh) scaleY(1.1); opacity: 0; }
    }

    @keyframes floatClouds {
      0%, 100% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
    }

    @keyframes pulseLoad {
      0% { transform: scaleX(0.08); opacity: 0.6; }
      25% { transform: scaleX(0.78); opacity: 1; }
      50% { transform: scaleX(0.68); opacity: 0.9; }
      75% { transform: scaleX(0.92); opacity: 1; }
      100% { transform: scaleX(0.12); opacity: 0.55; }
    }

    @media (max-width: 900px) {
      .content { grid-template-columns: 1fr; }
      .panel { min-height: 480px; }
    }

    @media (max-width: 620px) {
      .page { border-radius: 20px; }
      .content { padding: 24px; gap: 22px; }
      .window { max-width: 100%; height: 360px; }
      .window-top { height: 58px; padding: 12px 16px; }
      .hero h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <section class="hero">
        <h1>下雨天的解压时刻</h1>
        <p>让页面变成一片静谧的雨季场景，柔和的雨滴轻轻落下，慢节奏的光雾与渐变色让人感觉心情放松。</p>
        <div class="btn-row">
          <button class="button">慢慢看</button>
          <button class="button">静心放松</button>
        </div>
        <div class="info">
          <p>适合作为背景动画、演示页面或视觉展示界面。</p>
        </div>
      </section>

      <section class="panel">
        <div class="window">
          <div class="window-top">
            <div class="window-title">Rainy Day Relax</div>
            <div class="window-buttons">
              <span></span><span></span><span></span>
            </div>
          </div>
          <div class="scene">
            <div class="cloud"></div>
            <div class="rain">
              <div class="raindrop drop"></div>
              <div class="raindrop drop"></div>
              <div class="raindrop drop"></div>
              <div class="raindrop drop"></div>
              <div class="raindrop drop"></div>
              <div class="raindrop drop"></div>
              <div class="raindrop drop"></div>
              <div class="raindrop drop"></div>
              <div class="raindrop drop"></div>
              <div class="raindrop drop"></div>
            </div>
            <div class="drop-text">雨声轻敲窗棂，心绪在微光中慢慢放松。</div>
            <div class="window-content">
              <div class="card">
                <strong>静谧节奏</strong>
                <p>层叠的雨滴、朦胧的云雾与柔和的亮光，打造舒适的视觉节奏。</p>
              </div>
              <div class="card">
                <strong>轻柔动效</strong>
                <p>雨滴循环下落，云朵缓慢漂浮，形成平衡而不刺眼的动画效果。</p>
              </div>
              <div class="card">
                <strong>慢速流动</strong>
                <p>页面整体节奏稳定，适合做背景演示或者沉浸式视觉场景。</p>
              </div>
              <div class="card">
                <strong>柔和色彩</strong>
                <p>深色夜空与淡蓝高光组合，让画面富有质感且不失宁静。</p>
              </div>
            </div>
          </div>
          <div class="footer">
            <span>动态效果已就绪</span>
            <span>演示：下雨天解压</span>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
